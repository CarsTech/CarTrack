<!DOCTYPE html>
<html>
<head><title>CarTrack Icon Generator</title></head>
<body style="background:#111;color:#fff;font-family:sans-serif;padding:40px;text-align:center">
  <h2>CarTrack Icon Generator</h2>

  <div style="display:flex;gap:40px;justify-content:center;align-items:flex-start;margin-top:30px">
    <div><p>512×512</p><canvas id="c512" width="512" height="512" style="width:200px;height:200px;border:1px solid #444;border-radius:8px"></canvas></div>
    <div><p>192×192</p><canvas id="c192" width="192" height="192" style="width:130px;height:130px;border:1px solid #444;border-radius:8px"></canvas></div>
  </div>

  <br>
  <button onclick="download()" id="btnDl" style="margin-top:20px;padding:14px 32px;font-size:18px;background:#6B35CC;color:#fff;border:none;border-radius:8px;cursor:pointer">
    ⬇ Descarcă iconițele
  </button>
  <p id="status" style="color:#aaa;margin-top:12px">Se încarcă sigla...</p>

  <script>
    function drawOnCanvas(canvas, img) {
      const ctx = canvas.getContext('2d');
      const s = canvas.width;
      // Dark navy background
      ctx.fillStyle = '#14213D';
      ctx.fillRect(0, 0, s, s);
      // Draw image centered with small padding
      const pad = s * 0.04;
      ctx.drawImage(img, pad, pad, s - pad * 2, s - pad * 2);
    }

    const img = new Image();
    img.onload = () => {
      drawOnCanvas(document.getElementById('c512'), img);
      drawOnCanvas(document.getElementById('c192'), img);
      document.getElementById('status').textContent = '✓ Gata! Apasă butonul să descarci.';
    };
    img.onerror = () => {
      document.getElementById('status').textContent = '⚠ Nu s-a găsit logo-source.png lângă acest fișier.';
    };
    img.src = 'logo-source.png';

    function dl(canvas, name) {
      const a = document.createElement('a');
      a.download = name;
      a.href = canvas.toDataURL('image/png');
      a.click();
    }

    function download() {
      dl(document.getElementById('c512'), 'icon-512.png');
      setTimeout(() => dl(document.getElementById('c192'), 'icon-192.png'), 600);
      document.getElementById('status').textContent = '✓ icon-512.png și icon-192.png descărcate!';
    }
  </script>
</body>
</html>
